workflows:
  build:
    name: Build APK
    environment:
      # استخدام إصدار أقدم وأكثر توافقًا مع المشاريع القديمة
      flutter: 3.13.9
    scripts:
      - flutter clean
      - flutter pub get
      # --android-skip-build-dependency-validation: هذا الأمر يتجاوز فحوصات التوافق
      - flutter build apk --release --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
